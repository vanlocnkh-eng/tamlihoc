<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Making Test - Sàng lọc Nhận thức</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --grid-size: 360px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #facad2); background-size: 400% 400%; animation: gradientMove 12s ease infinite; color: #333;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { width: 100%; max-width: 800px; margin: auto; text-align: center; }
        .screen-box { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); backdrop-filter: blur(10px); }
        .screen { display: none; width: 100%; }
        .screen.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { color: #0d6efd; margin-bottom: 20px; font-size: 2em; }
        .btn { padding: 12px 20px; font-size: 16px; font-weight: bold; color: white; background-color: #0d6efd; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn:hover { transform: scale(1.05); background-color: #0b5ed7; box-shadow: 0 6px 20px rgba(13, 110, 253, 0.4); }
        .btn-secondary { background-color: #ff4757; color: white; }
        .btn-secondary:hover { background-color: #ff2a3d; box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); }
        .btn-level { width: 220px; margin: 10px; padding: 20px; font-size: 18px; background-color: #43e97b; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .btn-level:hover { background-color: #34d167; }
        #gameInfo { display: flex; justify-content: space-around; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; color: #555; background: rgba(0, 0, 0, 0.05); padding: 15px; border-radius: 15px; flex-wrap: wrap; gap: 10px; }
        .time-warning { color: #ff4757 !important; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        #tmtArea { width: 100%; height: 450px; background: white; border: 3px solid #333; border-radius: 15px; position: relative; margin: 20px 0; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        .tmt-node { position: absolute; width: 45px; height: 45px; border-radius: 50%; background: #fff; border: 3px solid #0d6efd; color: #0d6efd; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 16px; user-select: none; transition: background 0.2s, transform 0.1s, color 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transform: translate(-50%, -50%); }
        .tmt-node:active { transform: translate(-50%, -50%) scale(0.9); }
        .tmt-node.correct { background: #43e97b; border-color: #34d167; color: white; box-shadow: 0 0 15px rgba(67, 233, 123, 0.6); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background-color: #fff; padding: 35px; border-radius: 20px; width: 90%; max-width: 600px; text-align: center; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .modal-close { position: absolute; top: 15px; right: 25px; font-size: 35px; font-weight: bold; color: #aaa; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: #ff4757; }
        .modal-buttons { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 25px; }
        #historyContent { max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; margin-top: 15px; text-align: left; }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 10px; color: #555; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:white; margin-bottom:20px; text-shadow:0 0 10px rgba(0,0,0,0.2);">✏️ TRAIL MAKING TEST</h1>
        <div class="screen-box">
            
            <div id="levelSelectScreen" class="screen active">
                <h2>Chọn Cấp Độ Thử Thách</h2>
                <p style="margin-bottom: 20px; color: #555;">Kết nối các điểm theo thứ tự logic nhanh nhất có thể!</p>
                
                <div>
                    <button class="btn btn-level" data-level="A">Mức A (Số 1-15)</button>
                    <button class="btn btn-level" data-level="B">Mức B (1-A-2-B...)</button>
                </div>

                <div style="margin-top: 30px;">
                    <a href="trangchu.html" class="btn btn-secondary">🏠 Về Trang Chủ</a>
                </div>
            </div>

            <div id="gameScreen" class="screen">
                <div id="gameInfo">
                    <div id="gameTimer">⏱️ Thời gian: 4:00</div>
                    <div id="gameProgress">🎯 Tiến trình: 0%</div>
                    <div id="gameErrors">❌ Lỗi sai: 0</div>
                </div>
                <div id="tmtArea"></div>
                <div style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
                    <button class="btn" id="quitGameBtn">Thử lại mức khác</button>
                    <a href="trangchu.html" class="btn btn-secondary">🏠 Về Trang Chủ</a>
                </div>
            </div>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="closeResultModal">&times;</span>
            <h2 id="resultTitle">🎉 Hoàn Thành Xuất Sắc!</h2>
            <p id="resultTime" style="font-size: 1.1em; margin: 10px 0;"></p>
            <p id="resultErrors" style="font-weight: bold; color: #ff4757; font-size: 1.1em; margin: 10px 0;"></p>
            <h4 id="resultRisk" style="color: #ff9f43; font-size: 1.2em; margin: 10px 0;"></h4>
            <p id="resultAdvice" style="color: #555; font-style: italic;"></p>
            <div class="modal-buttons">
                <button class="btn" id="exportPDFBtn">📥 Tải báo cáo PDF</button>
                <button class="btn" style="background:#43e97b;" id="playAgainBtn">🔄 Chơi lại</button>
                <button class="btn btn-secondary" id="viewHistoryBtn">📜 Lịch sử</button>
            </div>
        </div>
    </div>
    
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="closeHistoryModal">&times;</span>
            <h2>Lịch sử kết quả TMT</h2>
            <div id="historyContent"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH GOOGLE SHEETS
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCcMzIe1zk1_6ZJXpp4IOt6ihxp_kWbc-S2ywvIuBYmuXL54bZTQhJ1h385ijfRR7Pqw/exec"; 

        document.addEventListener('DOMContentLoaded', () => {
            const playApplauseSound = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const bufferSize = ctx.sampleRate * 2.0;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    const noise = ctx.createBufferSource(); noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000; filter.Q.value = 1.5;
                    const gainNode = ctx.createGain(); gainNode.gain.setValueAtTime(0.4, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2.0);
                    noise.connect(filter); filter.connect(gainNode); gainNode.connect(ctx.destination); noise.start();
                } catch(e) { console.log(e); }
            };

            // Lấy thông tin User để gửi Google Sheets
            let savedUser = localStorage.getItem("user");
            let userInfo = { name: "Người chơi ẩn danh", class: "Không xác định", school: "", age: "N/A" };
            if (savedUser) {
                let parsed = JSON.parse(savedUser);
                userInfo.name = parsed.name || "Người chơi ẩn danh";
                userInfo.class = parsed.class || "Không xác định";
                userInfo.school = parsed.school || "";
                userInfo.age = parsed.age || "N/A";
            }

            let currentLevel = 'A', timerInterval = null, timeRemaining = 240, timeSpent = 0, errors = 0, nextNodeIndex = 0;
            let sequence = [], currentGameResult = {};

            const screens = { level: document.getElementById('levelSelectScreen'), game: document.getElementById('gameScreen') };
            const modals = { result: document.getElementById('resultModal'), history: document.getElementById('historyModal') };
            const tmtArea = document.getElementById('tmtArea');

            document.getElementById('levelSelectScreen').addEventListener('click', (e) => {
                if (e.target.matches('.btn-level')) {
                    currentLevel = e.target.getAttribute('data-level');
                    startGame(currentLevel);
                }
            });

            function startGame(level) {
                errors = 0; timeRemaining = 240; timeSpent = 0; nextNodeIndex = 0;
                document.getElementById('gameErrors').textContent = `❌ Lỗi sai: 0`;
                document.getElementById('gameProgress').textContent = `🎯 Tiến trình: 0%`;
                document.getElementById('gameTimer').classList.remove('time-warning');
                
                sequence = level === 'A' ? Array.from({length: 15}, (_, i) => (i + 1).toString()) : ['1','A','2','B','3','C','4','D','5','E','6','F','7','G','8'];
                tmtArea.innerHTML = '';
                generateNodes();
                screens.level.classList.remove('active'); screens.game.classList.add('active');
                startTimer();
            }

            function generateNodes() {
                const positions = [];
                sequence.forEach((val) => {
                    let x, y, overlap;
                    do {
                        overlap = false;
                        x = 5 + Math.random() * 90;
                        y = 5 + Math.random() * 90;
                        for (let pos of positions) {
                            let dist = Math.sqrt(Math.pow(x - pos.x, 2) + Math.pow(y - pos.y, 2));
                            if (dist < 14) { overlap = true; break; }
                        }
                    } while (overlap);
                    positions.push({x, y});

                    const node = document.createElement('div');
                    node.classList.add('tmt-node');
                    node.textContent = val;
                    node.style.left = `${x}%`;
                    node.style.top = `${y}%`;
                    node.addEventListener('click', () => handleNodeClick(val, node));
                    tmtArea.appendChild(node);
                });
            }

            function handleNodeClick(value, nodeElement) {
                if (value === sequence[nextNodeIndex]) {
                    nodeElement.classList.add('correct');
                    nextNodeIndex++;
                    document.getElementById('gameProgress').textContent = `🎯 Tiến trình: ${Math.round((nextNodeIndex/sequence.length)*100)}%`;
                    if (nextNodeIndex === sequence.length) endGame(false, false);
                } else {
                    if (!nodeElement.classList.contains('correct')) {
                        errors++;
                        document.getElementById('gameErrors').textContent = `❌ Lỗi sai: ${errors}`;
                        nodeElement.style.background = '#ff4757';
                        nodeElement.style.color = '#fff';
                        setTimeout(() => { if(!nodeElement.classList.contains('correct')) { nodeElement.style.background='#fff'; nodeElement.style.color='#0d6efd'; } }, 500);
                    }
                }
            }

            function startTimer() {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeRemaining--; timeSpent++;
                    let m = Math.floor(timeRemaining / 60), s = timeRemaining % 60;
                    document.getElementById('gameTimer').textContent = `⏱️ Thời gian: ${m}:${s < 10 ? '0' : ''}${s}`;
                    if (timeRemaining <= 30) document.getElementById('gameTimer').classList.add('time-warning');
                    if (timeRemaining <= 0) { alert("⏰ Hết thời gian 4 phút!"); endGame(false, true); }
                }, 1000);
            }

            // Gửi dữ liệu lên Google Sheets
            function saveGameScoreToSheet(resultObj) {
                let schoolClassInfo = userInfo.class + (userInfo.school ? " - " + userInfo.school : "");
                
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: "save_score",
                        name: userInfo.name,                         
                        schoolClass: schoolClassInfo,                 
                        gameName: `Trail Making Test (Mức ${resultObj.level})`, 
                        score: `Lỗi sai: ${resultObj.errors}`,    
                        timePlayed: resultObj.time + " giây",         
                        accuracy: `Nguy cơ: ${resultObj.risk}` 
                    })
                }).then(() => {
                    console.log("Đã gửi điểm lên Google Sheets thành công!");
                }).catch(err => console.log("Lỗi gửi điểm:", err));
            }

            function endGame(isQuit=false, isTimeout=false) {
                clearInterval(timerInterval);
                if (isQuit) return;

                let risk = "Thấp", advice = "Tốc độ xử lý và khả năng chú ý của bạn rất ổn định.";
                if (isTimeout || errors > 4 || timeSpent > 150) { risk = "Cao"; advice = "Bạn cần luyện tập thêm phản xạ và độ tập trung đa nhiệm."; }
                else if (errors > 2 || timeSpent > 90) { risk = "Trung bình"; advice = "Độ chính xác khá tốt, cố gắng đẩy nhanh tốc độ hơn nhé."; }

                currentGameResult = { date: new Date().toISOString(), level: currentLevel, time: timeSpent, errors, risk, advice };
                
                // Lưu vào LocalStorage
                let history = JSON.parse(localStorage.getItem('tmtHistory')) || []; 
                history.unshift(currentGameResult); 
                localStorage.setItem('tmtHistory', JSON.stringify(history));

                // Bắn dữ liệu về Google Sheets
                saveGameScoreToSheet(currentGameResult);

                if (!isTimeout) {
                    document.getElementById('resultTitle').textContent = `🎉 Hoàn Thành Xuất Sắc!`;
                    playApplauseSound();
                    let duration = 1500, end = Date.now() + duration;
                    let interval = setInterval(() => {
                        if (Date.now() > end) return clearInterval(interval);
                        confetti({ startVelocity: 30, spread: 360, ticks: 60, origin: { x: Math.random() * 0.3, y: Math.random() - 0.2 } });
                        confetti({ startVelocity: 30, spread: 360, ticks: 60, origin: { x: Math.random() * 0.3 + 0.7, y: Math.random() - 0.2 } });
                    }, 250);
                } else { document.getElementById('resultTitle').textContent = `⏰ Hết giờ mất rồi!`; }

                document.getElementById('resultTime').textContent = `⏱️ Tổng thời gian: ${timeSpent} giây`;
                document.getElementById('resultErrors').textContent = `❌ Lỗi sai: ${errors}`;
                document.getElementById('resultRisk').textContent = `Nguy cơ: ${risk}`;
                document.getElementById('resultAdvice').textContent = `💡 Lời khuyên: ${advice}`;
                modals.result.classList.add('active');
            }

            document.getElementById('quitGameBtn').addEventListener('click', () => { if(confirm('Hủy ván hiện tại?')) { endGame(true); screens.game.classList.remove('active'); screens.level.classList.add('active'); } });
            document.getElementById('playAgainBtn').addEventListener('click', () => { modals.result.classList.remove('active'); screens.game.classList.remove('active'); screens.level.classList.add('active'); });
            document.getElementById('closeResultModal').addEventListener('click', () => modals.result.classList.remove('active'));
            document.getElementById('closeHistoryModal').addEventListener('click', () => modals.history.classList.remove('active'));
            document.getElementById('viewHistoryBtn').addEventListener('click', () => {
                let history = JSON.parse(localStorage.getItem('tmtHistory')) || [];
                let content = document.getElementById('historyContent'); content.innerHTML = history.length ? '' : '<p>Chưa có lịch sử.</p>';
                history.forEach(item => {
                    content.innerHTML += `<div class="history-item"><b>📅 Ngày:</b> ${new Date(item.date).toLocaleString()}<br>⏱️ Thời gian: ${item.time}s | ❌ Lỗi: ${item.errors}<br><span style="color:orange">Nguy cơ: ${item.risk}</span></div>`;
                });
                modals.result.classList.remove('active'); modals.history.classList.add('active');
            });
            document.getElementById('exportPDFBtn').addEventListener('click', () => {
                const { jsPDF } = jspdf; const doc = new jsPDF();
                doc.text("BAO CAO KET QUA TRAIL MAKING TEST", 10, 20);
                doc.text(`Hoc sinh: ${userInfo.name} | Tuoi: ${userInfo.age}`, 10, 35);
                doc.text(`Thoi gian: ${currentGameResult.time} giay | Luot loi: ${currentGameResult.errors}`, 10, 50);
                doc.text(`Muc do nguy co: ${currentGameResult.risk}`, 10, 65);
                doc.save(`TMT_Report_${userInfo.name}.pdf`);
            });
        });
    </script>
</body>
</html>
