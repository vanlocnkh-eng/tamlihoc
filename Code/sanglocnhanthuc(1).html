<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Sàng lọc Nhận thức</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* === PHẦN CSS GIAO DIỆN === */
        :root {
            --card-size: 100px;
            --cols: 4; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #74ebd5, #ACB6E5, #ff9f43, #ff6b6b);
            background-size: 400% 400%;
            animation: bgmove 15s ease infinite;
        }

        @keyframes bgmove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: auto;
            text-align: center;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            font-size: 2.5em;
        }

        .screen-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .screen {
            display: none; 
            width: 100%;
        }
        
        .screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hiệu ứng Pop cho số đếm ngược */
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        h2 {
            color: #0d6efd;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #0d6efd;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #0b5ed7;
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }
        .btn-secondary {
            background-color: #ff4757;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #ff2a3d;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }
        .btn-level {
            width: 220px;
            margin: 10px;
            padding: 20px;
            font-size: 18px;
            background-color: #b8dd3f;
            color: #ff4d6d;
        }
        .btn-level:hover {
            background-color: #a4c935;
            color: #fff;
        }

        /* === Màn hình Game === */
        #gameInfo {
            display: flex;
            justify-content: space-around;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #555;
            background: rgba(0, 0, 0, 0.05);
            padding: 15px;
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time-warning {
            color: #ff4757 !important;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #gameBoard {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(var(--cols), 1fr);
            perspective: 1000px;
            justify-items: center;
        }

        .card {
            width: var(--card-size);
            height: var(--card-size);
            aspect-ratio: 1 / 1; 
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px; 
        }

        .card-front {
            background-color: #fff;
            color: #333;
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(135deg, #0d6efd, #00d2ff);
            color: white;
            font-size: 50px; 
        }

        /* === Modal === */
        .modal {
            display: none; 
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }
        .modal-content {
            background-color: #fff;
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .modal-content h2 {
            margin-top: 0;
            color: #0d6efd;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 35px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            color: #ff4757;
        }
        .modal-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 25px;
        }

        #historyContent {
            max-height: 400px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            margin-top: 15px;
            text-align: left;
        }
        .history-item {
            border-bottom: 1px solid #eee;
            padding: 15px 10px;
            color: #555;
            line-height: 1.6;
        }
        .history-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">🧠 MEMORY MATCHING 🎮</h1>

        <div class="screen-box">
            
            <div id="levelSelectScreen" class="screen active">
                <h2>Chọn Cấp Độ Thử Thách</h2>
                <p style="margin-bottom: 20px; color: #555;">Xin chào <b id="displayPlayerName"></b>! Sẵn sàng rèn luyện trí nhớ chưa?</p>
                
                <div>
                    <button class="btn btn-level" data-level="basic">Cơ bản (3x4)</button>
                    <button class="btn btn-level" data-level="medium">Trung bình (5x4)</button>
                    <button class="btn btn-level" data-level="advanced">Nâng cao (6x4)</button>
                </div>
                
                <div style="margin-top: 25px;">
                    <a href="trangchu.html" class="btn btn-secondary">🏠 Về Trang Chủ</a>
                </div>
            </div>

            <div id="readyScreen" class="screen">
                <h2 style="font-size: 2.5em; margin-bottom: 30px; color: #ff4757;">Are you ready? 😍</h2>
                <div style="display: flex; justify-content: center; gap: 20px;">
                    <button class="btn" id="btnYes" style="background-color: #2ecc71; font-size: 1.2em; padding: 15px 40px;">Yes</button>
                    <button class="btn btn-secondary" id="btnNo" style="font-size: 1.2em; padding: 15px 40px;">No</button>
                </div>
            </div>

            <div id="countdownScreen" class="screen">
                <div id="countdownText" style="font-size: 8em; color: #0d6efd; font-weight: bold; text-shadow: 0 4px 15px rgba(0,0,0,0.2);">3</div>
            </div>

            <div id="gameScreen" class="screen">
                <div id="gameInfo">
                    <div id="gameTimer">⏱️ Thời gian: 4:00</div>
                    <div id="gamePairs">✅ Cặp đúng: 0/0</div>
                    <div id="gameMoves">🔄 Lượt lật: 0</div>
                    <div id="gameErrors">❌ Lượt sai: 0</div>
                </div>
                
                <div id="gameBoard"></div>
                
                <div style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
                    <button class="btn" id="quitGameBtn">Thử lại mức khác</button>
                    <a href="trangchu.html" class="btn btn-secondary" id="homeBtn">🏠 Về Trang Chủ</a>
                </div>
            </div>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="closeResultModal">&times;</span>
            <h2 id="resultTitle">🎉 Tuyệt vời! Hoàn thành!</h2>
            <h3 style="color:#555;">Thống kê lượt chơi</h3>
            <p id="resultTime" style="font-size: 1.1em; margin: 10px 0;"></p>
            <p id="resultAvgTime" style="font-size: 1.1em; margin: 10px 0; font-weight: 600; color: #20bf6b;"></p>
            <p id="resultMoves" style="font-size: 1.1em; margin: 10px 0;"></p>
            <p id="resultErrors" style="font-weight: bold; color: #ff4757; font-size: 1.1em;"></p>
            <hr style="margin: 20px 0; border-top: 1px dashed #ccc;">
            <h3 style="color:#555;">Đánh giá Trí nhớ</h3>
            <h4 id="resultRisk" style="color: #ff9f43; font-size: 1.2em; margin: 10px 0;"></h4>
            <p id="resultAdvice" style="color: #555; font-style: italic;"></p>
            
            <div class="modal-buttons">
                <button class="btn" id="exportPDFBtn">📥 Tải báo cáo PDF</button>
                <button class="btn" style="background:#b8dd3f; color:#333;" id="playAgainBtn">🔄 Chơi lại</button>
                <button class="btn btn-secondary" id="viewHistoryBtn">📜 Lịch sử</button>
            </div>
        </div>
    </div>
    
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="closeHistoryModal">&times;</span>
            <h2>Lịch sử các lượt chơi</h2>
            <div id="historyContent"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH GOOGLE SHEETS
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCcMzIe1zk1_6ZJXpp4IOt6ihxp_kWbc-S2ywvIuBYmuXL54bZTQhJ1h385ijfRR7Pqw/exec"; 

        document.addEventListener('DOMContentLoaded', () => {
            
            // Hàm phát tiếng "Bíp"
            const playBeep = (freq, type = 'sine', duration = 0.15) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {
                    console.log("Audio play error: ", e);
                }
            };

            const playApplauseSound = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const bufferSize = ctx.sampleRate * 2.0; 
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                    const noise = ctx.createBufferSource(); noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000; filter.Q.value = 1.5;
                    const gainNode = ctx.createGain(); gainNode.gain.setValueAtTime(0.4, ctx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2.0);
                    noise.connect(filter); filter.connect(gainNode); gainNode.connect(ctx.destination); noise.start();
                } catch(e) {
                    console.log("Trình duyệt chặn âm thanh tự động hoặc không hỗ trợ: ", e);
                }
            };

            let userInfo = {};
            let savedUser = localStorage.getItem("user");
            
            if(savedUser) {
                let userObj = JSON.parse(savedUser);
                userInfo = {
                    hoTen: userObj.name || "Người chơi ẩn danh",
                    truong: userObj.school || "Không xác định",
                    lop: userObj.class || "Không xác định",
                    namSinh: userObj.age || "Không xác định" 
                };
                document.getElementById('displayPlayerName').innerText = userInfo.hoTen;
            } else {
                alert("Bạn chưa đăng nhập! Đang chuyển hướng về trang chủ...");
                window.location.href = "login.html"; 
                return;
            }

            const screens = {
                level: document.getElementById('levelSelectScreen'),
                ready: document.getElementById('readyScreen'),
                countdown: document.getElementById('countdownScreen'),
                game: document.getElementById('gameScreen'),
            };

            const modals = {
                result: document.getElementById('resultModal'),
                history: document.getElementById('historyModal'),
            };

            const levelSelectScreen = document.getElementById('levelSelectScreen');
            const gameBoard = document.getElementById('gameBoard');
            const quitGameBtn = document.getElementById('quitGameBtn');
            const homeBtn = document.getElementById('homeBtn'); 

            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            const countdownText = document.getElementById('countdownText');

            const closeResultModal = document.getElementById('closeResultModal');
            const closeHistoryModal = document.getElementById('closeHistoryModal');
            const exportPDFBtn = document.getElementById('exportPDFBtn');
            const playAgainBtn = document.getElementById('playAgainBtn');
            const viewHistoryBtn = document.getElementById('viewHistoryBtn');
            
            let currentGameResult = {}; 
            let pendingLevel = ''; 
            let currentLevel = 'basic';
            let firstCard = null;
            let secondCard = null;
            let lockBoard = false;
            let matchedPairs = 0;
            let totalPairs = 0;
            
            let timerInterval = null;
            let timeRemaining = 240; 
            let timeSpent = 0;
            let moves = 0;
            let errors = 0;

            const allIcons = ['🎨','🧩','🚀','💡','🎵','📚','🧬','🤖','🌍','🧭','🔬','⏳','⭐','🧠','✏️','🏆','🎯','🔑']; 

            const levelConfig = {
                basic: { pairs: 6, cols: 4, size: 100, memorizeTime: 800 },     
                medium: { pairs: 10, cols: 4, size: 90, memorizeTime: 1500 },    
                advanced: { pairs: 12, cols: 4, size: 85, memorizeTime: 2000 },  
            };

            function showScreen(screenId) {
                Object.values(screens).forEach(screen => screen.classList.remove('active'));
                screens[screenId].classList.add('active');
            }
            function showModal(modalId) { modals[modalId].classList.add('active'); }
            function hideModal(modalId) { modals[modalId].classList.remove('active'); }

            // Lắng nghe chọn nút Mức độ
            levelSelectScreen.addEventListener('click', (e) => {
                if (e.target.matches('.btn-level')) {
                    pendingLevel = e.target.getAttribute('data-level');
                    showScreen('ready'); 
                }
            });

            // Nhấn "No" thì quay lại chọn cấp độ
            btnNo.addEventListener('click', () => {
                showScreen('level');
            });

            // Nhấn "Yes" thì bắt đầu đếm ngược kèm âm thanh
            btnYes.addEventListener('click', () => {
                showScreen('countdown');
                let count = 3;
                countdownText.textContent = count;
                
                countdownText.style.animation = 'none';
                void countdownText.offsetWidth; 
                countdownText.style.animation = 'pop 1s ease-out';
                
                playBeep(440); // Tiếng bíp cho số 3

                let countInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownText.textContent = count;
                        countdownText.style.animation = 'none';
                        void countdownText.offsetWidth;
                        countdownText.style.animation = 'pop 1s ease-out';
                        
                        playBeep(440); // Tiếng bíp cho số 2 và 1
                        
                    } else if (count === 0) {
                        countdownText.textContent = "GO!";
                        countdownText.style.animation = 'none';
                        void countdownText.offsetWidth;
                        countdownText.style.animation = 'pop 1s ease-out';
                        
                        playBeep(880, 'square', 0.4); // Tiếng bíp cao và dài hơn cho chữ GO!
                        
                    } else {
                        clearInterval(countInterval);
                        currentLevel = pendingLevel;
                        startGame(currentLevel);
                    }
                }, 1000);
            });
            
            quitGameBtn.addEventListener('click', () => {
                if (confirm('Bạn chắc chắn rời khi đang chơi chứ?')) {
                    endGame(true); 
                    showScreen('level');
                }
            });

            // Cập nhật câu thông báo khi bấm nút "Về Trang Chủ"
            homeBtn.addEventListener('click', (e) => {
                if (screens.game.classList.contains('active')) {
                    if (!confirm('Bạn chắc chắn rời khi đang chơi chứ?')) {
                        e.preventDefault(); 
                    }
                }
            });

            function startGame(level) {
                const config = levelConfig[level];
                totalPairs = config.pairs;
                matchedPairs = 0;
                moves = 0;
                errors = 0;
                timeRemaining = 240; 
                timeSpent = 0;
                firstCard = null;
                secondCard = null;
                lockBoard = true; // Khóa bảng trong lúc nhớ

                document.documentElement.style.setProperty('--cols', config.cols);
                document.documentElement.style.setProperty('--card-size', `${config.size}px`);
                
                document.getElementById('gamePairs').textContent = `✅ Cặp đúng: 0/${totalPairs}`;
                document.getElementById('gameMoves').textContent = `🔄 Lượt lật: 0`;
                document.getElementById('gameErrors').textContent = `❌ Lượt sai: 0`;
                document.getElementById('gameTimer').classList.remove('time-warning');

                let icons = allIcons.slice(0, config.pairs);
                let cardsArray = [...icons, ...icons];
                cardsArray.sort(() => 0.5 - Math.random()); 

                gameBoard.innerHTML = '';
                cardsArray.forEach(icon => {
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.dataset.icon = icon;
                    card.innerHTML = `
                        <div class="card-face card-front">${icon}</div>
                        <div class="card-face card-back">🧠</div>
                    `;
                    card.addEventListener('click', flipCard);
                    gameBoard.appendChild(card);
                });

                showScreen('game');

                // Lật bài lên để ghi nhớ
                setTimeout(() => {
                    const allCards = document.querySelectorAll('.card');
                    allCards.forEach(card => card.classList.add('is-flipped'));
                    
                    // Úp lại sau thời gian quy định
                    setTimeout(() => {
                        allCards.forEach(card => card.classList.remove('is-flipped'));
                        lockBoard = false;
                        startTimer(); // Bắt đầu tính giờ sau khi đã úp bài
                    }, config.memorizeTime);
                }, 100);
            }

            function startTimer() {
                clearInterval(timerInterval);
                const timerDisplay = document.getElementById('gameTimer');
                
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    timeSpent++;
                    
                    let minutes = Math.floor(timeRemaining / 60);
                    let seconds = timeRemaining % 60;
                    timerDisplay.textContent = `⏱️ Thời gian: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

                    if (timeRemaining <= 30) { timerDisplay.classList.add('time-warning'); }
                    if (timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        alert("⏰ Đã hết thời gian 4 phút! Trò chơi sẽ dừng lại.");
                        endGame(false, true);
                    }
                }, 1000);
            }

            function flipCard() {
                if (lockBoard) return;
                if (this === firstCard) return; 
                if (this.classList.contains('is-flipped')) return; 

                this.classList.add('is-flipped');
                if (!firstCard) { firstCard = this; return; }

                secondCard = this;
                moves++; 
                document.getElementById('gameMoves').textContent = `🔄 Lượt lật: ${moves}`;
                lockBoard = true;

                checkForMatch();
            }

            function checkForMatch() {
                let isMatch = firstCard.dataset.icon === secondCard.dataset.icon;
                isMatch ? disableCards() : unflipCards();
            }

            function disableCards() {
                firstCard.removeEventListener('click', flipCard);
                secondCard.removeEventListener('click', flipCard);
                matchedPairs++;
                
                document.getElementById('gamePairs').textContent = `✅ Cặp đúng: ${matchedPairs}/${totalPairs}`;
                resetBoard();
                
                if (matchedPairs === totalPairs) { setTimeout(() => endGame(false, false), 500); }
            }

            function unflipCards() {
                errors++; 
                document.getElementById('gameErrors').textContent = `❌ Lượt sai: ${errors}`;
                setTimeout(() => {
                    firstCard.classList.remove('is-flipped');
                    secondCard.classList.remove('is-flipped');
                    resetBoard();
                }, 500); 
            }

            function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }
            
            // Gửi lên Google Sheets
            function saveGameScoreToSheet(resultObj) {
                let levelText = resultObj.level === 'basic' ? 'Cơ bản' : (resultObj.level === 'medium' ? 'Trung bình' : 'Nâng cao');
                let schoolClassInfo = userInfo.lop + (userInfo.truong ? " - " + userInfo.truong : "");
                let accuracyPercent = resultObj.moves > 0 ? Math.round((totalPairs / resultObj.moves) * 100) + "%" : "0%";

                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: "save_score",
                        name: userInfo.hoTen,                         
                        schoolClass: schoolClassInfo,                 
                        gameName: "Memory Matching (" + levelText + ")", 
                        score: `Lật sai: ${resultObj.errors} lần`,    
                        timePlayed: resultObj.time + " giây",         
                        accuracy: `${accuracyPercent} (Nguy cơ: ${resultObj.risk})` 
                    })
                }).then(() => console.log("Gửi Google Sheets thành công!")).catch(err => console.log(err));
            }

            function endGame(isQuit = false, isTimeout = false) {
                clearInterval(timerInterval);
                if (isQuit) return; 

                const avgCorrectTime = totalPairs > 0 ? (timeSpent / totalPairs).toFixed(2) : 0;
                const assessment = calculateRisk(timeSpent, errors, moves, currentLevel);
                
                currentGameResult = {
                    date: new Date().toISOString(),
                    level: currentLevel,
                    time: timeSpent,
                    avgTime: avgCorrectTime, 
                    moves: moves,
                    errors: errors,
                    risk: isTimeout ? "Cao (Quá thời gian)" : assessment.risk,
                    advice: isTimeout ? "Bạn đã hết thời gian 4 phút quy định. Hãy rèn luyện thêm khả năng tập trung và phản xạ nhanh nhé!" : assessment.advice
                };
                
                saveHistory(currentGameResult);
                saveGameScoreToSheet(currentGameResult);

                if (!isTimeout) {
                    document.getElementById('resultTitle').textContent = `🎉 Tuyệt vời! Hoàn thành!`;
                    playApplauseSound(); 
                    let duration = 1500; let animationEnd = Date.now() + duration; let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };
                    let interval = setInterval(function() {
                        let timeLeft = animationEnd - Date.now();
                        if (timeLeft <= 0) return clearInterval(interval);
                        let particleCount = 50 * (timeLeft / duration);
                        confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.3, y: Math.random() - 0.2 } }));
                        confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.3 + 0.7, y: Math.random() - 0.2 } }));
                    }, 250);
                } else { document.getElementById('resultTitle').textContent = `⏰ Hết giờ mất rồi!`; }

                document.getElementById('resultTime').textContent = `⏱️ Tổng thời gian chơi: ${timeSpent} giây`;
                document.getElementById('resultAvgTime').textContent = `⏱️ T.gian lật đúng trung bình: ${avgCorrectTime} giây / cặp`;
                document.getElementById('resultMoves').textContent = `🔄 Tổng lượt lật: ${moves}`;
                document.getElementById('resultErrors').textContent = `❌ Số lần lật sai: ${errors}`;
                document.getElementById('resultRisk').textContent = `Nguy cơ: ${currentGameResult.risk}`;
                document.getElementById('resultAdvice').textContent = `💡 Lời khuyên: ${currentGameResult.advice}`;
                showModal('result');
            }

            function calculateRisk(time, errors, moves, level) {
                let risk = "Thấp", advice = "Trí nhớ ngắn hạn của bạn rất tuyệt vời! Tiếp tục duy trì phong độ nhé.";
                let errorThreshold = (level === 'basic') ? 4 : (level === 'medium' ? 8 : 12);
                let timeThreshold = (level === 'basic') ? 45 : (level === 'medium' ? 100 : 180);

                if (errors > errorThreshold || time > timeThreshold) { risk = "Trung bình"; advice = "Có vẻ bạn đang hơi mất tập trung một chút. Hãy nghỉ ngơi đủ giấc và thử lại nha."; }
                if (errors > errorThreshold * 1.5 || time > timeThreshold * 1.5) { risk = "Cao"; advice = "Trò chơi có vẻ hơi căng thẳng với bạn. Đừng lo lắng, hãy thả lỏng và cải thiện sự tập trung thông qua các bài tập hằng ngày."; }
                return { risk, advice };
            }

            function saveHistory(result) {
                let history = JSON.parse(localStorage.getItem('memoryGameHistory')) || [];
                history.unshift(result);
                if (history.length > 20) history.pop();
                localStorage.setItem('memoryGameHistory', JSON.stringify(history));
            }

            function showHistory() {
                let history = JSON.parse(localStorage.getItem('memoryGameHistory')) || [];
                const historyContent = document.getElementById('historyContent');
                if (history.length === 0) { historyContent.innerHTML = "<p style='padding: 10px;'>Chưa có lịch sử chơi.</p>"; return; }

                historyContent.innerHTML = '';
                history.forEach(item => {
                    const date = new Date(item.date).toLocaleString('vi-VN');
                    let levelText = item.level === 'basic' ? 'Cơ bản (3x4)' : (item.level === 'medium' ? 'Trung bình (5x4)' : 'Nâng cao (6x4)');
                    historyContent.innerHTML += `
                        <div class="history-item">
                            <strong style="color:#0d6efd;">📅 Ngày: ${date}</strong> (Cấp độ: <b>${levelText}</b>)<br>
                            ⏱️ Tổng: ${item.time}s | ⚡ Trung bình đúng: ${item.avgTime || '0'}s/cặp<br>
                            🔄 Lật: ${item.moves} | ❌ Sai: ${item.errors}<br>
                            <em style="color:#ff9f43;">Nguy cơ: ${item.risk}</em><br>
                            <em>💡 ${item.advice}</em>
                        </div>
                    `;
                });
                hideModal('result'); showModal('history');
            }

            function exportPDF() {
                if (typeof jspdf === 'undefined') { alert('Lỗi: Không tải được thư viện PDF.'); return; }
                const { jsPDF } = jspdf; const doc = new jsPDF();
                doc.setFontSize(18); doc.text("BAO CAO KET QUA (MEMORY GAME)", 10, 20); doc.setFontSize(12); doc.text("----------------------------", 10, 25);
                doc.text("Thong tin hoc sinh:", 10, 35); doc.text(`Ho ten: ${userInfo.hoTen}`, 15, 43); doc.text(`Truong: ${userInfo.truong}`, 15, 51); doc.text(`Lop: ${userInfo.lop}`, 15, 59); doc.text(`Tuoi: ${userInfo.namSinh}`, 15, 67);
                doc.text("----------------------------", 10, 77); doc.text("Ket qua luot choi gan nhat:", 10, 85);
                const date = new Date(currentGameResult.date).toLocaleString('vi-VN');
                let levelText = currentGameResult.level === 'basic' ? 'Co ban (3x4)' : (currentGameResult.level === 'medium' ? 'Trung binh (5x4)' : 'Nang cao (6x4)');
                doc.text(`Ngay choi: ${date}`, 15, 93); doc.text(`Cap do: ${levelText}`, 15, 101); doc.text(`Tong thoi gian: ${currentGameResult.time} giay`, 15, 109); doc.text(`Thoi gian lat dung trung binh: ${currentGameResult.avgTime} giay / cap`, 15, 117); doc.text(`Tong luot lat: ${currentGameResult.moves}`, 15, 125); doc.text(`So lan lat sai: ${currentGameResult.errors}`, 15, 133);
                doc.text("----------------------------", 10, 143); doc.text("Danh gia:", 10, 151); doc.setFont('helvetica', 'bold'); doc.text(`Muc do nguy co: ${currentGameResult.risk}`, 15, 159); doc.setFont('helvetica', 'normal');
                doc.save(`BaoCao_MemoryGame_${userInfo.hoTen}_${new Date().toISOString().split('T')[0]}.pdf`);
            }
            
            playAgainBtn.addEventListener('click', () => { hideModal('result'); showScreen('level'); });
            viewHistoryBtn.addEventListener('click', showHistory);
            exportPDFBtn.addEventListener('click', exportPDF);
            closeResultModal.addEventListener('click', () => hideModal('result'));
            closeHistoryModal.addEventListener('click', () => hideModal('history'));
            window.addEventListener('click', (e) => { if (e.target == modals.result) hideModal('result'); if (e.target == modals.history) hideModal('history'); });

            showScreen('level');
        });
    </script>
</body>
</html>
